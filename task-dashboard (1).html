<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Task Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #ffffff;
    --bg2:       #f7f7f5;
    --bg3:       #efede9;
    --border:    rgba(55,53,47,0.12);
    --border2:   rgba(55,53,47,0.22);
    --text:      #37352f;
    --text2:     #6b6860;
    --text3:     #9b9892;
    --radius:    8px;
    --radius-lg: 12px;
    --green:     #1d9e75;
    --green-lt:  #e1f5ee;
    --green-tx:  #0f6e56;
    --amber-lt:  #faeeda;
    --amber-tx:  #854f0b;
    --red-lt:    #fcebeb;
    --red-tx:    #a32d2d;
    --gray-lt:   #f1efe8;
    --gray-tx:   #5f5e5a;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:        #191919;
      --bg2:       #252525;
      --bg3:       #2f2f2f;
      --border:    rgba(255,255,255,0.1);
      --border2:   rgba(255,255,255,0.2);
      --text:      #e8e8e4;
      --text2:     #9b9892;
      --text3:     #6b6860;
      --green-lt:  #0a3327;
      --green-tx:  #5dcaa5;
      --amber-lt:  #3a2600;
      --amber-tx:  #fac775;
      --red-lt:    #3a1010;
      --red-tx:    #f09595;
      --gray-lt:   #2c2c2a;
      --gray-tx:   #b4b2a9;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 24px;
    max-width: 680px;
    margin: 0 auto;
  }

  /* ── Header ── */
  .header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 8px; }
  .title  { font-size: 22px; font-weight: 600; }
  .today  { font-size: 13px; color: var(--text2); }

  /* ── Summary stats ── */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 28px; }
  .stat  { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .stat-num   { font-size: 24px; font-weight: 600; }
  .stat-label { font-size: 12px; color: var(--text2); margin-top: 3px; }

  /* ── Section label ── */
  .sec-label { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }

  /* ── Cards ── */
  .cards { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }

  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }

  .card-top  { padding: 16px 18px 14px; }
  .card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
  .card-name { font-size: 15px; font-weight: 500; flex: 1; line-height: 1.4; }
  .card-name.done { text-decoration: line-through; color: var(--text3); }

  /* badge */
  .badge      { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
  .badge-ok   { background: var(--green-lt);  color: var(--green-tx); }
  .badge-warn { background: var(--amber-lt);  color: var(--amber-tx); }
  .badge-urg  { background: var(--red-lt);    color: var(--red-tx); }
  .badge-done { background: var(--gray-lt);   color: var(--gray-tx); }

  /* progress bar */
  .prog-row  { display: flex; align-items: center; gap: 10px; }
  .prog-bar  { flex: 1; height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
  .prog-txt  { font-size: 12px; color: var(--text2); white-space: nowrap; min-width: 40px; text-align: right; }

  /* card footer */
  .card-foot { display: flex; align-items: center; justify-content: space-between; padding: 8px 18px; border-top: 0.5px solid var(--border); background: var(--bg2); }
  .due-txt   { font-size: 12px; color: var(--text2); }
  .exp-btn   { font-size: 12px; color: var(--text2); cursor: pointer; padding: 3px 9px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); }
  .exp-btn:hover { background: var(--bg3); }

  /* subtasks */
  .subtasks { border-top: 0.5px solid var(--border); }
  .sub-row  { display: flex; align-items: center; gap: 10px; padding: 9px 18px 9px 32px; cursor: pointer; transition: background 0.1s; }
  .sub-row:hover { background: var(--bg2); }

  .sub-chk {
    width: 16px; height: 16px; border-radius: 4px;
    border: 0.5px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.15s, border-color 0.15s;
    cursor: pointer;
  }
  .sub-chk.done { background: var(--green); border-color: var(--green); }
  .sub-chk svg  { display: none; }
  .sub-chk.done svg { display: block; }

  .sub-lbl      { font-size: 13px; color: var(--text2); }
  .sub-lbl.done { text-decoration: line-through; color: var(--text3); }

  /* ── Add button ── */
  .add-btn {
    width: 100%; padding: 10px; border: 0.5px dashed var(--border2);
    border-radius: var(--radius); background: transparent;
    color: var(--text2); font-size: 13px; cursor: pointer;
    font-family: inherit; margin-bottom: 32px;
  }
  .add-btn:hover { background: var(--bg2); }

  /* ── Modal ── */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .modal {
    background: var(--bg); border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg); padding: 24px; width: 90%; max-width: 400px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 18px; }
  .field       { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; }
  .field input, .field textarea {
    width: 100%; padding: 8px 10px; font-size: 14px; font-family: inherit;
    background: var(--bg2); border: 0.5px solid var(--border2);
    border-radius: var(--radius); color: var(--text);
    outline: none;
  }
  .field input:focus, .field textarea:focus { border-color: var(--green); }
  .field textarea { resize: vertical; min-height: 70px; }
  .modal-foot { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
  .btn-cancel {
    padding: 8px 16px; border: 0.5px solid var(--border2); border-radius: var(--radius);
    background: transparent; font-size: 13px; cursor: pointer; color: var(--text2); font-family: inherit;
  }
  .btn-save {
    padding: 8px 18px; border: none; border-radius: var(--radius);
    background: var(--green); color: #fff; font-size: 13px;
    font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .btn-save:hover   { background: #0f6e56; }
  .btn-cancel:hover { background: var(--bg2); }

  /* ── Notion info banner ── */
  .notion-tip {
    font-size: 12px; color: var(--text3); border-top: 0.5px solid var(--border);
    padding-top: 14px; line-height: 1.6;
  }
</style>
</head>
<body>

<div class="header">
  <div class="title">My Tasks</div>
  <div class="today" id="today"></div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-num" id="s-total">0</div><div class="stat-label">Total tasks</div></div>
  <div class="stat"><div class="stat-num" id="s-done">0</div><div class="stat-label">Completed</div></div>
  <div class="stat"><div class="stat-num" id="s-urgent">0</div><div class="stat-label">Due soon</div></div>
</div>

<div class="sec-label">Active tasks</div>
<div class="cards" id="cards"></div>
<button class="add-btn" onclick="openModal()">+ Add task</button>

<div class="notion-tip">
  💡 To embed this in Notion: type <strong>/embed</strong> on a page, paste the URL of this hosted file, and resize the block to fit.
</div>

<!-- Modal -->
<div class="overlay" id="overlay" style="display:none">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Add new task</div>
    <div class="field">
      <label>Task name</label>
      <input id="m-name" type="text" placeholder="e.g. Dissertation prep" />
    </div>
    <div class="field">
      <label>Due date</label>
      <input id="m-due" type="date" />
    </div>
    <div class="field">
      <label>Subtasks — one per line (optional)</label>
      <textarea id="m-subs" placeholder="Read chapter 3&#10;Write summary&#10;Submit draft"></textarea>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save"   onclick="addTask()">Add task</button>
    </div>
  </div>
</div>

<script>
// ── Default data ────────────────────────────────────────────────
const DEFAULTS = [
  { id: 't1', name: 'Final Year Report', due: '2026-04-29', subs: [
      { id: 's1a', label: 'Email Dominic',                           done: false },
      { id: 's1b', label: 'Intro write up',                          done: false },
      { id: 's1c', label: 'Methods editing',                         done: false },
      { id: 's1d', label: 'Descriptives and ANOVA',                  done: false },
      { id: 's1e', label: 'Correlations',                            done: false },
      { id: 's1f', label: 'Thematic analysis',                       done: false },
      { id: 's1g', label: 'Qualitative and quantitative match-ups',  done: false },
      { id: 's1h', label: 'Analysis write up',                       done: false },
      { id: 's1i', label: 'Discussion sections',                     done: false },
  ]}
];

// ── State ────────────────────────────────────────────────────────
let tasks    = [];
let expanded = {};

const KEY = 'notion_task_dashboard_v1';

function save()   { try { localStorage.setItem(KEY, JSON.stringify(tasks)); } catch(e) {} }
function load()   {
  try {
    const raw = localStorage.getItem(KEY);
    tasks = raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(DEFAULTS));
  } catch(e) {
    tasks = JSON.parse(JSON.stringify(DEFAULTS));
  }
  render();
}

// ── Helpers ──────────────────────────────────────────────────────
const CHECK_SVG = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none">
  <polyline points="2,5 4,7.5 8,3" stroke="white" stroke-width="1.8"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>`;

function daysLeft(due) {
  const d = new Date(due); d.setHours(23, 59, 59);
  return Math.ceil((d - new Date()) / 86400000);
}

function badge(days, allDone) {
  if (allDone)    return ['badge-done', 'Done'];
  if (days < 0)   return ['badge-urg',  'Overdue'];
  if (days === 0) return ['badge-urg',  'Due today'];
  if (days <= 7)  return ['badge-urg',  `${days}d left`];
  if (days <= 21) return ['badge-warn', `${days}d left`];
  return               ['badge-ok',   `${days}d left`];
}

function progColor(pct) {
  if (pct === 100) return '#1d9e75';
  if (pct >= 50)   return '#5dcaa5';
  return '#9fe1cb';
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

// ── Actions ──────────────────────────────────────────────────────
function toggleSub(tid, sid) {
  const t = tasks.find(x => x.id === tid);
  const s = t.subs.find(x => x.id === sid);
  s.done = !s.done;
  save(); render();
}

function openModal()  { document.getElementById('overlay').style.display = 'flex'; }
function closeModal() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('m-name').value = '';
  document.getElementById('m-due').value  = '';
  document.getElementById('m-subs').value = '';
}

function addTask() {
  const name  = document.getElementById('m-name').value.trim();
  const due   = document.getElementById('m-due').value;
  const raw   = document.getElementById('m-subs').value.trim();
  if (!name || !due) { alert('Please fill in task name and due date.'); return; }
  const subs  = raw
    ? raw.split('\n').filter(Boolean).map((l, i) => ({ id: 'n' + Date.now() + i, label: l.trim(), done: false }))
    : [];
  tasks.push({ id: 't' + Date.now(), name, due, subs });
  closeModal(); save(); render();
}

// close overlay on backdrop click
document.getElementById('overlay').addEventListener('click', closeModal);

// ── Render ───────────────────────────────────────────────────────
function render() {
  // today label
  document.getElementById('today').textContent =
    new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });

  // summary stats
  const total  = tasks.length;
  const done   = tasks.filter(t => t.subs.length && t.subs.every(s => s.done)).length;
  const urgent = tasks.filter(t => {
    const allDone = t.subs.length && t.subs.every(s => s.done);
    return !allDone && daysLeft(t.due) <= 7;
  }).length;

  document.getElementById('s-total').textContent  = total;
  document.getElementById('s-done').textContent   = done;
  document.getElementById('s-urgent').textContent = urgent;

  // cards
  const container = document.getElementById('cards');
  container.innerHTML = '';

  tasks.forEach(t => {
    const hasSubs  = t.subs.length > 0;
    const doneSubs = hasSubs ? t.subs.filter(s => s.done).length : 0;
    const totalS   = t.subs.length;
    const pct      = hasSubs ? Math.round(doneSubs / totalS * 100) : 0;
    const allDone  = hasSubs && doneSubs === totalS;
    const days     = daysLeft(t.due);
    const [bCls, bTxt] = badge(days, allDone);
    const isExp    = !!expanded[t.id];

    const card = document.createElement('div');
    card.className = 'card';

    // card top
    const top = document.createElement('div');
    top.className = 'card-top';
    top.innerHTML = `
      <div class="card-head">
        <div class="card-name ${allDone ? 'done' : ''}">${t.name}</div>
        <span class="badge ${bCls}">${bTxt}</span>
      </div>
      ${hasSubs ? `
        <div class="prog-row">
          <div class="prog-bar">
            <div class="prog-fill" style="width:${pct}%; background:${progColor(pct)}"></div>
          </div>
          <div class="prog-txt">${doneSubs}/${totalS}</div>
        </div>` : ''}
    `;
    card.appendChild(top);

    // card footer
    const foot = document.createElement('div');
    foot.className = 'card-foot';
    foot.innerHTML = `<div class="due-txt">Due ${fmtDate(t.due)}</div>`;
    if (hasSubs) {
      const btn = document.createElement('button');
      btn.className = 'exp-btn';
      btn.textContent = isExp ? 'Hide tasks' : 'Show tasks';
      btn.onclick = () => { expanded[t.id] = !expanded[t.id]; render(); };
      foot.appendChild(btn);
    }
    card.appendChild(foot);

    // subtasks (if expanded)
    if (hasSubs && isExp) {
      const subsEl = document.createElement('div');
      subsEl.className = 'subtasks';
      t.subs.forEach(s => {
        const row = document.createElement('div');
        row.className = 'sub-row';
        row.innerHTML = `
          <div class="sub-chk ${s.done ? 'done' : ''}">${s.done ? CHECK_SVG : ''}</div>
          <div class="sub-lbl ${s.done ? 'done' : ''}">${s.label}</div>
        `;
        row.onclick = () => toggleSub(t.id, s.id);
        subsEl.appendChild(row);
      });
      card.appendChild(subsEl);
    }

    container.appendChild(card);
  });
}

// ── Boot ─────────────────────────────────────────────────────────
load();
</script>
</body>
</html>
